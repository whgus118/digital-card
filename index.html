<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            --accent-color: #38bdf8;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 배경 장식용 원형 */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            bottom: 10%;
            right: 10%;
            background: linear-gradient(135deg, #f472b6 0%, #fb923c 100%);
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* 메인 카드 스타일 */
        .card {
            width: 380px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            position: relative;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 영역 */
        .profile-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 50%;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #1e293b;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #1e293b;
            color: var(--text-muted);
        }

        /* 텍스트 스타일 */
        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        .tagline {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* 정보 리스트 */
        .info-list {
            list-style: none;
            text-align: left;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: background 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .info-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            color: var(--accent-color);
        }

        .info-content {
            font-size: 14px;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            display: block;
        }

        /* 복사 버튼 효과 알림 */
        .toast {
            position: fixed;
            bottom: 30px;
            background: rgba(56, 189, 248, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(20px);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- 배경 장식 -->
    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <!-- 명함 카드 -->
    <div class="card">
        <div class="profile-container">
            <!-- 이미지가 없을 경우 아이콘을 보여주는 예시입니다. -->
            <!-- 실제 이미지를 넣으려면 <img src="이미지주소" alt="프로필" class="profile-img"> 를 사용하세요 -->
            <div class="profile-img">
                <img src="./profile.png">
            </div>
        </div>

        <h1 class="name">이채연 (chaeyeon lee)</h1>
        <p class="tagline">더 나은 사용자 경험을 고민하는<br>UI/UX 디자이너 & 개발자입니다.</p>

        <div class="info-list">
            <a href="whgus@gmail.com" class="info-item" id="email-link">
                <i data-lucide="mail" class="info-icon"></i>
                <div class="info-content">
                    <span class="info-label">Email Address</span>
                    whgus118@gmail.com
                </div>
            </a>
            
            <div class="info-item">
                <i data-lucide="map-pin" class="info-icon"></i>
                <div class="info-content">
                    <span class="info-label">Location</span>
                    Seoul, South Korea
                </div>
            </div>

            <div class="info-item">
                <i data-lucide="globe" class="info-icon"></i>
                <div class="info-content">
                    <span class="info-label">Portfolio</span>
                    www.portfolio.com
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">이메일 주소가 복사되었습니다!</div>

    <script>
        // 아이콘 초기화
        lucide.createIcons();

        // 이메일 클릭 시 복사 기능 예시
        const emailLink = document.getElementById('email-link');
        const toast = document.getElementById('toast');

        emailLink.addEventListener('click', (e) => {
            e.preventDefault();
            const email = "contact@example.com";
            
            // 클립보드 복사 (최신 API 사용 불가 환경 대비)
            const el = document.createElement('textarea');
            el.value = email;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            // 토스트 메시지 표시
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        });
    </script>
</body>
</html>
